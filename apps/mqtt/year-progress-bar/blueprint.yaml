# TC002 年进度条
# 在 TC002 上显示今年的进度，52 列 × 7 行日历点阵。

blueprint:
  name: TC002 年进度条
  description: |
    在 TC002 上显示今年的进度，52 列 × 7 行日历点阵。
    已过去日期显示暗绿色，今天显示亮绿色呼吸动画。
    右上角显示进度百分比。

    Author: 王行知
    License: GPL-3.0-or-later
  domain: automation
  source_url: https://github.com/UlanziTechnology/Ulanzi-U-Clock-TC002/blob/main/apps/mqtt/year-progress-bar/blueprint.yaml
  input:
    custom_app_topic:
      name: TC002 Custom App MQTT topic
      description: 格式：[PREFIX]/custom/[APP_NAME]
      default: ulanzi_1bf6/custom/year_progress
      selector:
        text: {}
    display_duration:
      name: 显示时长
      description: payload duration 值，单位秒。
      default: 31536000
      selector:
        number:
          min: 1
          max: 31536000
          unit_of_measurement: s
          mode: box
    update_hour:
      name: 更新时间（小时）
      description: 每天几点更新进度条（0-23）
      default: 8
      selector:
        number:
          min: 0
          max: 23
          unit_of_measurement: "h"
          mode: box

mode: restart

trigger:
  - platform: time
    at: !input update_hour

action:
  - service: mqtt.publish
    data:
      topic: !input custom_app_topic
      retain: true
      payload: >-
        {% set today = now().date() %}
        {% set start = today.replace(month=1, day=1) %}
        {% set end = today.replace(year=today.year + 1, month=1, day=1) %}
        {% set total = (end - start).days %}
        {% set done = ((today - start).days + 1) %}
        {% set pct = (done / total * 100) | round(0) | int %}
        {% set cell = [done - 1, 363] | min %}
        {% set week = (cell // 7) %}
        {% set dayrow = (cell %% 7) %}
        {
          "duration": {{ display_duration | int }},
          "text": [],
          "image": [{"data": "", "position": [0, 0]}],
          "draw": [
            {"df": [0, 9, {{ week }}, 9 + {{ dayrow }}, "#003E1A"]},
            {"df": [{{ week }}, 9 + {{ dayrow }}, {{ week }}, 9 + {{ dayrow }}, "#00D678"]}
          ]
        }
