# TC002 Claude Bot
# 通过 MQTT 发布 TC002 Custom App JSON payload。
# 合并到官方仓库后的目标路径：
# https://github.com/UlanziTechnology/Ulanzi-U-Clock-TC002/blob/main/apps/mqtt/claude-bot/blueprint.yaml

blueprint:
  name: TC002 Claude Bot
  description: |
    把 Ulanzi U-Clock TC002 变成一个 Claude Bot 吉祥物显示器。

    这个 Blueprint 会监听一个 Home Assistant 实体。
    当实体状态为 loop 或 usage 之一时，
    自动向 TC002 Custom App MQTT topic 发布对应的 Claude Bot 显示内容。

    loop: Claude Bot 循环动画
    usage: Claude Bot 用量条（静态）

    Author: 王行知
    License: GPL-3.0-or-later
  domain: automation
  source_url: https://raw.githubusercontent.com/UlanziTechnology/Ulanzi-U-Clock-TC002/main/apps/mqtt/claude-bot/blueprint.yaml
  input:
    status_entity:
      name: 状态实体
      description: 用来提供当前状态的 Home Assistant 实体，例如 input_select。
      selector:
        entity: {}
    custom_app_topic:
      name: TC002 Custom App MQTT topic
      description: 通常是 [PREFIX]/custom/[APP_NAME]，例如 ulanzi_1bf6/custom/claude_bot。
      default: ulanzi_1bf6/custom/claude_bot
      selector:
        text: {}
    app_duration:
      name: 显示时长
      description: 写入 TC002 Custom App payload 的 duration 值，单位为秒。
      default: 3600
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: s
          mode: box
    retain_message:
      name: 保留 MQTT 消息
      description: 是否让 broker 保留最后一条消息，便于 TC002 重连后恢复显示。
      default: false
      selector:
        boolean: {}
    loop_state:
      name: 循环动画状态值
      default: "loop"
      selector:
        text: {}
    usage_state:
      name: 用量条状态值
      default: "usage"
      selector:
        text: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input status_entity

variables:
  status_entity_id: !input status_entity
  duration: !input app_duration
  loop_value: !input loop_state
  usage_value: !input usage_state
  current_status: "{{ states(status_entity_id) | lower }}"
  loop_image: "data:image/gif;base64,"
  usage_image: "data:image/gif;base64,"

action:
  - service: mqtt.publish
    data:
      topic: !input custom_app_topic
      retain: !input retain_message
      payload: >-
        {% set image = loop_image %}
        {% if current_status == usage_value | lower %}
          {% set image = usage_image %}
        {% endif %}
        {
          "duration": {{ duration | int }},
          "text": [],
          "image": [{"data": "{{ image }}", "position": [0, 0]}],
          "draw": []
        }
