# TC002 Vibe Coding 红绿灯
# 通过 MQTT 发布 TC002 Custom App JSON payload。
# 合并到官方仓库后的目标路径：
# https://github.com/UlanziTechnology/Ulanzi-U-Clock-TC002/blob/main/apps/mqtt/vibe-coding-signal-light/blueprint.yaml

blueprint:
  name: TC002 Vibe Coding 红绿灯
  description: |
    把 Ulanzi U-Clock TC002 变成一个桌面状态红绿灯。

    这个 Blueprint 会监听一个 Home Assistant 实体。
    当实体状态为 off、idle、working、attention、blocked 之一时，
    自动向 TC002 Custom App MQTT topic 发布对应的红绿灯显示内容。

    off: 全黑熄灭
    idle: 绿灯
    working: 绿、黄、红循环
    attention: 黄灯闪烁
    blocked: 红灯闪烁

    Author: 王行知
    License: GPL-3.0-or-later
  domain: automation
  source_url: https://raw.githubusercontent.com/UlanziTechnology/Ulanzi-U-Clock-TC002/main/apps/mqtt/vibe-coding-signal-light/blueprint.yaml
  input:
    status_entity:
      name: 状态实体
      description: 用来提供当前状态的 Home Assistant 实体，例如 input_select。
      selector:
        entity: {}
    custom_app_topic:
      name: TC002 Custom App MQTT topic
      description: 通常是 [PREFIX]/custom/[APP_NAME]，例如 ulanzi_1bf6/custom/vibe_signal。
      default: ulanzi_1bf6/custom/vibe_signal
      selector:
        text: {}
    app_duration:
      name: 显示时长
      description: 写入 TC002 Custom App payload 的 duration 值，单位为秒。
      default: 3600
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: s
          mode: box
    retain_message:
      name: 保留 MQTT 消息
      description: 是否让 broker 保留最后一条消息，便于 TC002 重连后恢复显示。
      default: false
      selector:
        boolean: {}
    off_state:
      name: 熄灭状态值
      default: "off"
      selector:
        text: {}
    idle_state:
      name: 空闲状态值
      default: "idle"
      selector:
        text: {}
    working_state:
      name: 工作中状态值
      default: "working"
      selector:
        text: {}
    attention_state:
      name: 需要注意状态值
      default: "attention"
      selector:
        text: {}
    blocked_state:
      name: 阻塞状态值
      default: "blocked"
      selector:
        text: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input status_entity

variables:
  status_entity_id: !input status_entity
  duration: !input app_duration
  off_value: !input off_state
  idle_value: !input idle_state
  working_value: !input working_state
  attention_value: !input attention_state
  blocked_value: !input blocked_state
  current_status: "{{ states(status_entity_id) | lower }}"
  off_image: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADQAAAAQCAIAAADWJ8ucAAAAGUlEQVR4nO3BAQ0AAADCoPdPbQ43oAAAeDYJ0AAB6JU80AAAAABJRU5ErkJggg=="
  idle_image: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADQAAAAQCAIAAADWJ8ucAAAAaElEQVR4nGNgGAXkAUYU3rMYLEqkljAMsOOeYXPWQDuRCc1lz/gbsCsk6HoaACY0l0l9xOG4gXAfEzIHn8sGAjAxDGLAxDCIARPDIAZMDIMYMJFQgNG9qGMibOuyZYTVjMDqaxQwkAkAxkIVYvKQJgMAAAAASUVORK5CYII="
  working_image: "data:image/gif;base64,"
  attention_image: "data:image/gif;base64,R0lGODlhNAAQAIEAAOb13P/FJqVrAAAAACH/C05FVFNDQVBFMi4wAwEAAAAh+QQASAAAACwAAAAANAAQAAAIVgAHCBxIsKDBgwgTKlzIsKHDhwYDSJwYAKJFhRQzSrzIcSBFABo3drT4MeTEkRBNhkT5UKVGlg5dZoTZUCZFmgxtnsS5UCfPmiYFVPwZ8yXRo0iTEgwIACH5BABIAAAALBIAAgAPAAwAgQAAAAAAAAAAAAAAAAgYAAEIHEiwoMGDCBMqXMiwocOHECNKTBgQADs="
  blocked_image: "data:image/gif;base64,R0lGODlhNAAQAIEAAOb13P82NqUAAAAAACH/C05FVFNDQVBFMi4wAwEAAAAh+QQAUgAAACwAAAAANAAQAAAIVQAHCBxIsKDBgwgTKlzIsKHDhxARBphIMUDEixIrarSIsWNFABsndrz4MSTFkRBNhkT5UOVGlg5daoTZUGZFmgxtnsS5UCfPmiYFcPwJdCbRo0gvBgQAIfkEAFIAAAAsJAACAA8ADACBAAAAAAAAAAAAAAAACBgAAQgcSLCgwYMIEypcyLChw4cQI0pMGBAAOw=="

action:
  - service: mqtt.publish
    data:
      topic: !input custom_app_topic
      retain: !input retain_message
      payload: >-
        {% set image = off_image %}
        {% if current_status == idle_value | lower %}
          {% set image = idle_image %}
        {% elif current_status == working_value | lower %}
          {% set image = working_image %}
        {% elif current_status == attention_value | lower %}
          {% set image = attention_image %}
        {% elif current_status == blocked_value | lower %}
          {% set image = blocked_image %}
        {% endif %}
        {
          "duration": {{ duration | int }},
          "text": [],
          "image": [{"data": "{{ image }}", "position": [0, 0]}],
          "draw": []
        }
